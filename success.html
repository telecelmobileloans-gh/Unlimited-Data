<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Telecel - Transaction Successful</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #E30613 0%, #0033A0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }
        
        .container {
            width: 100%; 
            max-width: 420px;
            background: #fff; 
            border-radius: 16px;
            padding: 40px 24px; 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            text-align: center;
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: #28a745;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 24px;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }
        
        h1 { 
            font-size: 26px; 
            font-weight: 700; 
            margin-bottom: 12px;
            color: #28a745;
        }
        
        .message { 
            font-size: 16px; 
            color: #555; 
            line-height: 1.6; 
            margin-bottom: 32px; 
        }

        .timer-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .timer-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .timer-value {
            font-size: 32px;
            font-weight: 700;
            color: #0033A0;
        }
        
        .btn-home {
            width: 100%; 
            padding: 18px; 
            font-size: 18px; 
            font-weight: 700;
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.2s; 
            color: #fff; 
            background: linear-gradient(135deg, #E30613 0%, #0033A0 100%);
            border: none;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-home:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(227, 6, 19, 0.35);
        }

        .info-text {
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✓</div>
        
        <h1>Transaction Successful!</h1>
        
        <p class="message">
            Your purchase has been processed successfully. Please wait while we activate your bundle.
        </p>

        <div class="timer-box">
            <div class="timer-label">Estimated Activation Time</div>
            <div class="timer-value" id="timer">02:00</div>
        </div>

        <p class="message" style="font-weight: 600; color: #333;">
            Please check your bundle balance after the timer reaches zero.
        </p>
        
        <a href="index.html" class="btn-home">Return to Home</a>

        <p class="info-text">
            A confirmation SMS will be sent to your number shortly.
        </p>
    </div>

    <script>
        // Simple countdown timer
        let timeLeft = 120; // 2 minutes in seconds
        const timerDisplay = document.getElementById('timer');

        const countdown = setInterval(() => {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;

            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerDisplay.textContent = "00:00";
                timerDisplay.style.color = "#28a745";
                document.querySelector('.timer-label').textContent = "Bundle Ready!";
            } else {
                timeLeft--;
            }
        }, 1000);
    </script>
</body>
</html>
